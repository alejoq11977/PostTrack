<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="830px" preserveAspectRatio="none" style="width:736px;height:830px;background:#FFFFFF;" version="1.1" viewBox="0 0 736 830" width="736px" zoomAndPan="magnify"><title>PostTrack &#8212; Actividad: Recordatorios de reportes vencidos (Celery beat)</title><defs/><g><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="503.6201" x="114.9719" y="34.9659">PostTrack &#8212; Actividad: Recordatorios de reportes vencidos (Celery beat)</text><ellipse cx="373.3841" cy="60.0679" fill="#222222" rx="10" ry="10" style="stroke:#222222;stroke-width:1.0;"/><rect fill="#F1F1F1" height="52.6882" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="274.8098" x="235.9792" y="90.0679"/><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="254.8098" x="245.9792" y="112.896">Celery beat dispara send_overdue_reminders</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="100.2607" x="245.9792" y="129.2401">(cada 30 minutos)</text><rect fill="#F1F1F1" height="52.6882" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="285.1059" x="230.8311" y="162.7561"/><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="265.1059" x="240.8311" y="185.5842">Obtener monitoreos ACTIVOS con salida a casa</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="147.433" x="240.8311" y="201.9283">y overdue_emails_sent &lt; 3</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="187.6532" x="279.5575" y="298.4263"/><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="167.6532" x="289.5575" y="321.2544">Tomar el siguiente monitoreo</text><rec