<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" contentStyleType="text/css" height="696px" preserveAspectRatio="none" style="width:1716px;height:696px;background:#FFFFFF;" version="1.1" viewBox="0 0 1716 696" width="1716px" zoomAndPan="magnify"><title>PostTrack &#8212; Clases focalizadas: Motor de reglas de riesgo</title><defs/><g><text fill="#000000" font-family="Helvetica" font-size="14" font-weight="bold" lengthAdjust="spacing" textLength="401.8685" x="650.2924" y="24.9659">PostTrack &#8212; Clases focalizadas: Motor de reglas de riesgo</text><!--class RiskLevel--><g id="elem_RiskLevel"><rect codeLine="12" fill="#F5EEF8" height="102.2717" id="RiskLevel" rx="2.5" ry="2.5" style="stroke:#6C3483;stroke-width:0.5;" width="70.3798" x="513.5" y="126.0679"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="60.3537" x="518.513" y="146.0339">RiskLevel</text><line style="stroke:#6C3483;stroke-width:0.5;" x1="514.5" x2="582.8798" y1="155.1358" y2="155.1358"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="31.2899" x="519.5" y="174.1018">LOW</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="58.3798" x="519.5" y="193.1697">MEDIUM</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="35.6859" x="519.5" y="212.2376">HIGH</text><line style="stroke:#6C3483;stroke-width:0.5;" x1="514.5" x2="582.8798" y1="220.3396" y2="220.3396"/></g><!--class GeneralQuestion--><g id="elem_GeneralQuestion"><rect codeLine="18" fill="#F5EEF8" height="159.4754" id="GeneralQuestion" rx="2.5" ry="2.5" style="stroke:#6C3483;stroke-width:0.5;" width="209.1332" x="7" y="386.0679"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="111.8596" x="55.6368" y="406.0339">GeneralQuestion</text><line style="stroke:#6C3483;stroke-width:0.5;" x1="8" x2="215.1332" y1="415.1358" y2="415.1358"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="83.8457" x="13" y="434.1018">+text : String</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="97.1316" x="13" y="453.1697">+factor : String</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.6673" x="13" y="472.2376">+associated_risk : RiskLevel</text><line style="stroke:#6C3483;stroke-width:1.0;" x1="8" x2="215.1332" y1="480.3396" y2="480.3396"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="197.1332" x="13" y="499.3055">Pregunta fija del cuestionario.</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="193.8433" x="13" y="518.3734">associated_risk es el respaldo</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="190.0493" x="13" y="537.4414">si no hay riesgo por ventana.</text></g><!--class RiskWindow--><g id="elem_RiskWindow"><rect codeLine="28" fill="#F5EEF8" height="140.4075" id="RiskWindow" rx="2.5" ry="2.5" style="stroke:#6C3483;stroke-width:0.5;" width="237.6931" x="251.5" y="395.5679"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="79.8697" x="330.4117" y="415.5339">RiskWindow</text><line style="stroke:#6C3483;stroke-width:0.5;" x1="252.5" x2="488.1931" y1="424.6358" y2="424.6358"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="90.0197" x="257.5" y="443.6018">+label : String</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.8975" x="257.5" y="462.6697">+start_hour : Integer</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="104.2156" x="257.5" y="481.7376">+order : Integer</text><line style="stroke:#6C3483;stroke-width:1.0;" x1="252.5" x2="488.1931" y1="489.8396" y2="489.8396"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="225.6931" x="257.5" y="508.8055">Ventana activa = mayor start_hour</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="164.0654" x="257.5" y="527.8734">&lt;= horas desde la cirug&#237;a</text></g><!--class FactorWindowRisk--><g id="elem_FactorWindowRisk"><rect codeLine="37" fill="#F5EEF8" height="83.2038" id="FactorWindowRisk" rx="2.5" ry="2.5" style="stroke:#6C3483;stroke-width:0.5;" width="182.8693" x="279" y="606.0679"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="121.0155" x="309.9269" y="626.0339">FactorWindowRisk</text><line style="stroke:#6C3483;stroke-width:0.5;" x1="280" x2="460.8693" y1="635.1358" y2="635.1358"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="139.3134" x="285" y="654.1018">+risk_level : RiskLevel</text><line style="stroke:#6C3483;stroke-width:1.0;" x1="280" x2="460.8693" y1="662.2038" y2="662.2038"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="170.8693" x="285" y="681.1697">unique(question, window)</text></g><!--class RiskRule--><g id="elem_RiskRule"><rect codeLine="43" fill="#F5EEF8" height="140.4075" id="RiskRule" rx="2.5" ry="2.5" style="stroke:#6C3483;stroke-width:0.5;" width="248.9336" x="648" y="395.5679"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="55.3698" x="744.7819" y="415.5339">RiskRule</text><line style="stroke:#6C3483;stroke-width:0.5;" x1="649" x2="895.9336" y1="424.6358" y2="424.6358"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="95.9276" x="654" y="443.6018">+name : String</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="134.9175" x="654" y="462.6697">+question_ids : JSON</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="153.4394" x="654" y="481.7376">+result_level : RiskLevel</text><line style="stroke:#6C3483;stroke-width:1.0;" x1="649" x2="895.9336" y1="489.8396" y2="489.8396"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="175.3213" x="654" y="508.8055">Combinaci&#243;n: si TODAS las</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="236.9336" x="654" y="527.8734">preguntas est&#225;n en S&#205; &#8594; result_level</text></g><!--class RiskThreshold--><g id="elem_RiskThreshold"><rect codeLine="52" fill="#F5EEF8" height="140.4075" id="RiskThreshold" rx="2.5" ry="2.5" style="stroke:#6C3483;stroke-width:0.5;" width="219.1992" x="932" y="395.5679"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="92.6656" x="995.2668" y="415.5339">RiskThreshold</text><line style="stroke:#6C3483;stroke-width:0.5;" x1="933" x2="1150.1992" y1="424.6358" y2="424.6358"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.5215" x="938" y="443.6018">+level : RiskLevel</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="136.7935" x="938" y="462.6697">+min_count : Integer</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="159.4314" x="938" y="481.7376">+escalates_to : RiskLevel</text><line style="stroke:#6C3483;stroke-width:1.0;" x1="933" x2="1150.1992" y1="489.8396" y2="489.8396"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="207.1992" x="938" y="508.8055">Acumulaci&#243;n: si #factores(level)</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.8218" x="938" y="527.8734">&gt;= min_count &#8594; escalates_to</text></g><!--class Svc--><g id="elem_Svc"><rect codeLine="61" fill="#F5EEF8" height="260.0912" id="Svc" rx="2.5" ry="2.5" style="stroke:#6C3483;stroke-width:0.5;" width="309.2609" x="618" y="47.0679"/><text fill="#000000" font-family="Helvetica" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="47.5203" x="748.8703" y="64.896">&#171;service&#187;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="94.1216" x="725.5696" y="83.378">evaluate_risk()</text><line style="stroke:#6C3483;stroke-width:0.5;" x1="619" x2="926.2609" y1="92.4799" y2="92.4799"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="197.0632" x="624" y="111.4459">+answers : List&lt;AnswerInput&gt;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="186.1433" x="624" y="130.5138">+hours_since_surgery : Float</text><line style="stroke:#6C3483;stroke-width:1.0;" x1="619" x2="926.2609" y1="138.6158" y2="138.6158"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.6173" x="624" y="157.5817">1. resuelve la ventana activa</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="174.2574" x="624" y="176.6496">2. mapea riesgo por factor</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="297.2609" x="624" y="195.7176">(FactorWindowRisk, respaldo associated_risk)</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="178.1913" x="624" y="214.7855">3. cuenta factores por nivel</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="201.4453" x="624" y="233.8534">4. candidatos = factor m&#225;s alto</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="233.8271" x="624" y="252.9213">+reglas + umbrales que se cumplan</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="247.4771" x="624" y="271.9892">5. resultado = M&#193;XIMO de candidatos</text><line style="stroke:#6C3483;stroke-width:1.0;" x1="619" x2="926.2609" y1="280.0912" y2="280.0912"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="187.9493" x="624" y="299.0571">returns RiskEvaluationResult</text></g><!--class RiskEvaluationResult--><g id="elem_RiskEvaluationResult"><rect codeLine="76" fill="#F5EEF8" height="137.6837" id="RiskEvaluationResult" rx="2.5" ry="2.5" style="stroke:#6C3483;stroke-width:0.5;" width="201.8952" x="1186.5" y="396.5679"/><text fill="#000000" font-family="Helvetica" font-size="12" font-style="italic" lengthAdjust="spacing" textLength="61.7285" x="1256.5834" y="414.396">&#171;dataclass&#187;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="135.7855" x="1219.5549" y="432.878">RiskEvaluationResult</text><line style="stroke:#6C3483;stroke-width:0.5;" x1="1187.5" x2="1387.3952" y1="441.9799" y2="441.9799"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.5215" x="1192.5" y="460.9459">+level : RiskLevel</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="189.8952" x="1192.5" y="480.0138">+counts : Map&lt;RiskLevel,int&gt;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="184.8273" x="1192.5" y="499.0817">+applied_rules : List&lt;String&gt;</text><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="109.7876" x="1192.5" y="518.1496">+window : String</text><line style="stroke:#6C3483;stroke-width:0.5;" x1="1187.5" x2="1387.3952" y1="526.2516" y2="526.2516"/></g><g id="elem_GMN18"><path d="M1423.5,434.0679 L1423.5,497.186 L1709.4532,497.186 L1709.4532,444.0679 L1699.4532,434.0679 L1423.5,434.0679 " fill="#FEFFDD" style="stroke:#181818;stroke-width:0.5;"/><path d="M1699.4532,434.0679 L1699.4532,444.0679 L1709.4532,444.0679 L1699.4532,434.0679 " fill="#FEFFDD" style="stroke:#181818;stroke-width:1.0;"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="250.4972" x="1429.5" y="452.9649">El nivel final es el M&#193;XIMO entre el factor</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="264.9532" x="1429.5" y="470.6709">individual m&#225;s alto, las combinaciones y los</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="252.2652" x="1429.5" y="488.377">umbrales. El orden no altera el resultado.</text></g><!--link GeneralQuestion to FactorWindowRisk--><g id="link_GeneralQuestion_FactorWindowRisk"><path codeLine="83" d="M216.1,539.2579 C248.81,561.9979 278.8039,582.8324 307.1339,602.5324 " fill="none" id="GeneralQuestion-to-FactorWindowRisk" style="stroke:#6C3483;stroke-width:1.0;"/><polygon fill="#6C3483" points="312.06,605.9579,306.9545,597.5357,307.9549,603.1034,302.3872,604.1038,312.06,605.9579" style="stroke:#6C3483;stroke-width:1.0;"/><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="7.436" x="224.0497" y="540.9508">1</text><text fill="#000000" font-family="Helvetica" font-size="13" lengthAdjust="spacing" textLength="21.567" x="279.2709" y="594.2854">0..*</text></g><!--link RiskWindow to FactorWindowRisk--><g id="link_RiskWindow_FactorWindowRisk"><path codeLine="84" d="M370.5,535.6479 C370.5,559.4379 370.5,579.2979 370.5,600.0579 " fill="none" id="RiskWindow-to-FactorWindowRisk" style="stroke:#6C3483;stroke-width:1.0;"/><polygon fill="#6C3483" points="370.5,606.0579,374.5,597.0579,370.5,601.0579,366.5,597.0579,370.5,606.0579" style="stroke:#6C3483;str