163" y="537.1916">en FactorWindowRisk de la ventana</text><rect fill="#F1F1F1" height="52.6882" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="203.0613" x="129.1364" y="570.7076"/><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="183.0613" x="139.1364" y="593.5357">Si no existe, usar associated_risk</text><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="142.237" x="142.2565" y="609.8798">de la pregunta (respaldo)</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="276.5139" x="92.4102" y="643.3959"/><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="256.5139" x="102.4102" y="666.224">Contar factores por nivel (BAJO/MEDIO/ALTO)</text><rect fill="none" height="331.1145" style="stroke:#000000;stroke-width:1.5;" width="439.3342" x="11" y="701.74"/><path d="M260.3291,701.74 L260.3291,713.8079 L250.3291,723.8079 L11,723.8079 " fill="none" style="stroke:#000000;stroke-width:1.5;"/><text fill="#000000" font-family="Helvetica" font-size="14" lengthAdjust="spacing" textLength="239.3291" x="14" y="717.7059">Reunir candidatos (no por prioridad)</text><polygon fill="#F1F1F1" points="33,743.8079,135.5413,743.8079,147.5413,755.8079,135.5413,767.8079,33,767.8079,21,755.8079,33,743.8079" style="stroke:#181818;stroke-width:0.5;"/><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="8.1069" x="88.2706" y="779.5668">s&#237;</text><text fill="#000000" font-family="Helvetica" font-size="11" lengthAdjust="spacing" textLength="102.5413" x="33" y="760.0759">&#191;alg&#250;n factor ALTO?</text><rect fill="#F1F1F1" height="36.3441" rx="12.5" ry="12.5" style="stroke:#181818;stroke-width:0.5;" width="119.1927" x="24.6743" y="802.7898"/><text fill="#000000" font-family="Helvetica" font-size="12" lengthAdjust="spacing" textLength="99.1927" x="